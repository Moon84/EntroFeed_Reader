services:
  rss:
    environment:
      # make sure these match with where you're mounting volumes
      - CONFIG_DIR=/config
      - DATA_DIR=/data
      - RSS_BASE_URL=${RSS_BASE_URL-http://localhost:8000}
      - ENTROFEED_STORAGE_HANDLER=${ENTROFEED_STORAGE_HANDLER-sqlite}

      # LLM Provider Configuration
      - DEFAULT_LLM_PROVIDER=${DEFAULT_LLM_PROVIDER-dashscope}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - DASHSCOPE_MODEL=${DASHSCOPE_MODEL-qwen-plus}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL-http://localhost:11434/v1}
      - OLLAMA_MODEL=${OLLAMA_MODEL-llama3}

      # these variables depend on the handler(s) you want to use
      # you can also configure these through the UI if you want
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SLACK_API_TOKEN=${SLACK_API_TOKEN}
      - JIRA_API_TOKEN=${JIRA_API_TOKEN}
      - JIRA_EMAIL=${JIRA_EMAIL}
      - NTFY_BASE_URL=${NTFY_BASE_URL}
      - NTFY_TOPIC=${NTFY_TOPIC}

      # other variables that are unlikely to change
      - GITHUB_LINK=${GITHUB_LINK-https://github.com/Moon84/EntroFeed_Reader}
      - ENTROFEED_INTERNAL_PORT=${ENTROFEED_INTERNAL_PORT-80}
      - REFRESH_INTERVAL=${REFRESH_INTERVAL-5}
      - RECENT_HOURS=${RECENT_HOURS-36}
    build:
      context: .
      dockerfile: Dockerfile
    # replace build with this if you want to pull from registry
    # image: ghcr.io/entrofeed/entrofeed:latest
    ports:
      - 8000:80
    volumes:
      - ./configs:/config
      - data:/data
volumes:
  data: {}
