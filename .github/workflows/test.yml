name: Test
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  test-sqlite-playwright:
    uses: ./.github/workflows/full_test.yml
    with:
      storage_handler: sqlite
      content_retrieval_handler: playwright
      llm_handler: "null"

  test-sqlite-requests:
    uses: ./.github/workflows/full_test.yml
    with:
      storage_handler: sqlite
      content_retrieval_handler: requests
      llm_handler: "null"

  test-hybrid-playwright-dummy:
    uses: ./.github/workflows/full_test.yml
    with:
      storage_handler: hybrid
      content_retrieval_handler: playwright
      llm_handler: dummy

  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install uv
          uv venv
          source .venv/bin/activate
          make install-ci

      - name: Run tests with coverage
        run: |
          source .venv/bin/activate
          pytest --cov=src --cov-branch --cov-report=xml --cov-report=html -q

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          file: ./coverage.xml
          flags: unittests
          name: EntroFeed
          fail_ci_if_error: false
          verbose: true
