name: Full Test
on:
  workflow_call:
      inputs:
        storage_handler:
          required: true
          type: string
        content_retrieval_handler:
          required: true
          type: string
        llm_handler:
          required: true
          type: string

env:
  IMAGE_NAME: entrofeed

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      ENTROFEED_STORAGE_HANDLER: ${{ inputs.storage_handler }}
      CONFIG_DIR: ${{ github.workspace }}/tests/integration/config
      DATA_DIR: ${{ github.workspace }}/data
      RSS_BASE_URL: http://localhost:8000
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: install
        run: |
          pip install uv
          uv venv
          .venv/bin/uv pip install .
      - name: unit_test
        run: |
          .venv/bin/python -m pytest tests/ -q
          make clean
      - name: integration_test
        run: |
          mv tests/integration/config/settings-${{ inputs.content_retrieval_handler }}-${{ inputs.llm_handler}}.yml tests/integration/config/settings.yml
          .venv/bin/entrofeed load-settings
          .venv/bin/entrofeed load-feeds
          .venv/bin/entrofeed check-feeds
          make run-ci
          make integration-test
