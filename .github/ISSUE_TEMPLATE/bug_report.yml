name: Bug Report 🐛
description: Report a bug to help us improve
title: "[Bug] "
labels: ["bug", "needs-triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
        
        **Important**: Please check if the bug has already been reported before creating a new issue.

  - type: checkboxes
    id: search-check
    attributes:
      label: I have searched the existing issues
      description: Please search [open issues](https://github.com/Moon84/EntroFeed_Reader/issues?q=is%3Aissue+is%3Aopen) before submitting
      options:
        - label: Yes, I searched and found no relevant issues
          required: true

  - type: dropdown
    id: version
    attributes:
      label: Version
      description: What version of EntroFeed are you using?
      options:
        - Latest (main branch)
        - Latest stable release
        - Other (please specify in description)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is
      placeholder: |
        Steps to reproduce:
        1. Go to '...'
        2. Click on '...'
        3. See error
        
        Expected behavior: ...
        Actual behavior: ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Please paste any relevant log output (error messages, stack traces, etc.)
      placeholder: |
        ```
        Paste logs here
        ```

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Tell us about your environment:
        - OS: [e.g. macOS 14.0, Ubuntu 22.04]
        - Python version: [e.g. 3.11.5]
        - Installation method: [e.g. Docker, pip, source]
      placeholder: |
        - OS:
        - Python version:
        - Installation method: